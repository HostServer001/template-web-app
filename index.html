<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meme Template Builder</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --text: #f0f0f0; --muted: #888;
    --accent: #FFD700; --accent2: #ff6b35; --danger: #e74c3c;
    --success: #2ecc71; --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .header { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-shrink: 0; }
  .header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .header-title span { color: var(--accent); }
  .zone-count { background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

  #canvas-wrap { flex: 1; overflow: hidden; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
  #canvas-container { position: relative; display: inline-block; user-select: none; touch-action: none; }
  #meme-img { display: block; max-width: 100%; max-height: 100%; pointer-events: none; }

  .placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); }
  .placeholder-icon { width: 56px; height: 56px; border: 2px dashed var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .placeholder p { font-size: 13px; }

  .text-zone { position: absolute; border: 2px solid var(--accent); cursor: move; touch-action: none; border-radius: 4px; }
  .text-zone.selected { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(255,107,53,0.35); }

  .zone-label { position: absolute; top: -20px; left: 0; background: var(--accent); color: #000; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px 3px 3px 0; white-space: nowrap; pointer-events: none; }
  .zone-label.selected { background: var(--accent2); color: #fff; }

  .resize-handle { position: absolute; bottom: -6px; right: -6px; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: se-resize; border: 2px solid #000; touch-action: none; z-index: 10; }
  .text-zone.selected .resize-handle { background: var(--accent2); }

  .rotate-handle { position: absolute; top: -26px; right: -6px; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: grab; border: 2px solid #000; touch-action: none; z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }

  .zone-delete { position: absolute; top: -10px; right: -10px; width: 20px; height: 20px; background: var(--danger); color: #fff; border: none; border-radius: 50%; font-size: 13px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; z-index: 10; }

  .bottom-panel { background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  #upload-section { padding: 12px 16px; display: flex; gap: 8px; }
  .btn { flex: 1; padding: 10px 12px; border-radius: var(--radius); border: none; font-size: 13px; font-weight: 600; cursor: pointer; touch-action: manipulation; transition: opacity 0.15s; }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #000; }

  #zone-editor { padding: 10px 16px; border-top: 1px solid var(--border); display: none; gap: 8px; flex-direction: column; }
  #zone-editor.visible { display: flex; }
  .editor-row { display: flex; gap: 8px; align-items: center; }
  .editor-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; width: 60px; flex-shrink: 0; }
  .editor-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 13px; outline: none; }
  .editor-input:focus { border-color: var(--accent); }
  input[type=range] { flex: 1; accent-color: #3b82f6; }
  .rotation-val { font-size: 12px; color: #3b82f6; font-weight: 700; min-width: 36px; text-align: right; }

  #actions { padding: 10px 16px 14px; display: flex; gap: 8px; }
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #file-input { display: none; }
  .hint { padding: 6px 16px; font-size: 12px; color: var(--muted); text-align: center; }
  .hint strong { color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">Meme <span>Template</span> Builder</div>
    <div class="zone-count" id="zone-count">0 zones</div>
  </div>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🖼️</div>
        <p>Upload a meme image to start</p>
      </div>
      <img id="meme-img" src="" alt="" style="display:none;">
    </div>
  </div>

  <div class="bottom-panel">
    <div id="hint" class="hint" style="display:none;">
      Tap <strong>＋ Add Zone</strong> then tap image &nbsp;·&nbsp; <span style="color:#3b82f6">↻</span> blue dot rotates
    </div>
    <div id="upload-section">
      <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">📁 Upload Image</button>
      <button class="btn btn-secondary" id="add-zone-btn" style="display:none" onclick="toggleAddMode()">＋ Add Zone</button>
    </div>
    <div id="zone-editor">
      <div class="editor-row">
        <span class="editor-label">Name</span>
        <input class="editor-input" id="zone-name" placeholder="e.g. top_text" maxlength="30">
      </div>
      <div class="editor-row">
        <span class="editor-label">Align</span>
        <select class="editor-input" id="zone-align">
          <option value="center">Center</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>
      <div class="editor-row">
        <span class="editor-label">Rotate</span>
        <input type="range" id="zone-rotate" min="-180" max="180" step="1" value="0">
        <span class="rotation-val" id="rotate-val">0°</span>
      </div>
    </div>
    <div id="actions" style="display:none;">
      <button class="btn btn-danger" onclick="clearAll()">🗑 Clear</button>
      <button class="btn btn-success" onclick="exportTemplate()">✓ Done &amp; Export</button>
    </div>
  </div>

  <div id="toast"></div>
  <input type="file" id="file-input" accept="image/*">
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let zones = [], selectedId = null;
let imgNatW = 0, imgNatH = 0, imgDisplayW = 0, imgDisplayH = 0;
let addMode = false, zoneCounter = 0;
let dragging = null, resizing = null, rotating = null;
let dragStart = {}, resizeStart = {}, rotateStart = {};

const img = document.getElementById('meme-img');
const container = document.getElementById('canvas-container');

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    img.onload = () => {
      imgNatW = img.naturalWidth; imgNatH = img.naturalHeight;
      imgDisplayW = img.clientWidth; imgDisplayH = img.clientHeight;
      document.getElementById('add-zone-btn').style.display = '';
      document.getElementById('actions').style.display = '';
      document.getElementById('hint').style.display = '';
      document.getElementById('upload-section').querySelector('.btn-primary').textContent = '📁 Change';
    };
  };
  reader.readAsDataURL(file);
});

function getScale() {
  imgDisplayW = img.clientWidth; imgDisplayH = img.clientHeight;
  return { sx: imgNatW / imgDisplayW, sy: imgNatH / imgDisplayH };
}

function toggleAddMode() {
  addMode = !addMode;
  const btn = document.getElementById('add-zone-btn');
  btn.textContent = addMode ? '✕ Cancel' : '＋ Add Zone';
  btn.style.background = addMode ? 'var(--accent2)' : '';
  btn.style.color = addMode ? '#fff' : '';
  container.style.cursor = addMode ? 'crosshair' : 'default';
}

function getEventPos(e, el) {
  const rect = el.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}
function getClientPos(e) {
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX, y: src.clientY };
}

function onCanvasDown(e) {
  if (!addMode || !img.src) return;
  if (e.target !== img && e.target !== container) return;
  e.preventDefault();
  const pos = getEventPos(e, container);
  const w = imgDisplayW * 0.35, h = imgDisplayH * 0.12;
  const x = Math.max(0, Math.min(pos.x - w/2, imgDisplayW - w));
  const y = Math.max(0, Math.min(pos.y - h/2, imgDisplayH - h));
  addZone(x, y, w, h);
  if (addMode) toggleAddMode();
}
container.addEventListener('mousedown', onCanvasDown);
container.addEventListener('touchstart', onCanvasDown, { passive: false });

function addZone(px, py, pw, ph) {
  zoneCounter++;
  const id = 'z' + zoneCounter;
  const { sx, sy } = getScale();
  const zone = {
    id, name: 'text_' + zoneCounter, align: 'center', rotation: 0,
    x: Math.round(px * sx), y: Math.round(py * sy),
    w: Math.round(pw * sx), h: Math.round(ph * sy)
  };
  zones.push(zone);
  renderZone(zone);
  selectZone(id);
  updateCount();
}

function applyZoneStyle(el, zone, sx, sy) {
  el.style.left   = (zone.x / sx) + 'px';
  el.style.top    = (zone.y / sy) + 'px';
  el.style.width  = (zone.w / sx) + 'px';
  el.style.height = (zone.h / sy) + 'px';
  el.style.transform = `rotate(${zone.rotation}deg)`;
  el.style.transformOrigin = 'center center';
}

function renderZone(zone) {
  const { sx, sy } = getScale();
  const el = document.createElement('div');
  el.className = 'text-zone';
  el.id = 'zone-' + zone.id;
  applyZoneStyle(el, zone, sx, sy);

  const label = document.createElement('div');
  label.className = 'zone-label';
  label.textContent = zone.name;
  el.appendChild(label);

  const delBtn = document.createElement('button');
  delBtn.className = 'zone-delete';
  delBtn.textContent = '×';
  delBtn.addEventListener('click', e => { e.stopPropagation(); deleteZone(zone.id); });
  delBtn.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); deleteZone(zone.id); });
  el.appendChild(delBtn);

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'resize-handle';
  resizeHandle.addEventListener('mousedown', e => { e.stopPropagation(); startResize(e, zone.id); });
  resizeHandle.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); startResize(e, zone.id); }, { passive: false });
  el.appendChild(resizeHandle);

  const rotateHandle = document.createElement('div');
  rotateHandle.className = 'rotate-handle';
  rotateHandle.textContent = '↻';
  rotateHandle.addEventListener('mousedown', e => { e.stopPropagation(); startRotate(e, zone.id); });
  rotateHandle.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); startRotate(e, zone.id); }, { passive: false });
  el.appendChild(rotateHandle);

  el.addEventListener('mousedown', e => {
    if (e.target === resizeHandle || e.target === rotateHandle || e.target === delBtn) return;
    startDrag(e, zone.id);
  });
  el.addEventListener('touchstart', e => {
    if (e.target === resizeHandle || e.target === rotateHandle || e.target === delBtn) return;
    startDrag(e, zone.id);
  }, { passive: false });

  el.addEventListener('click', () => selectZone(zone.id));
  container.appendChild(el);
}

function reRenderZone(zone) {
  const el = document.getElementById('zone-' + zone.id);
  if (!el) return;
  const { sx, sy } = getScale();
  applyZoneStyle(el, zone, sx, sy);
  el.querySelector('.zone-label').textContent = zone.name;
}

function deleteZone(id) {
  zones = zones.filter(z => z.id !== id);
  document.getElementById('zone-' + id)?.remove();
  if (selectedId === id) { selectedId = null; hideEditor(); }
  updateCount();
}

function selectZone(id) {
  document.querySelectorAll('.text-zone').forEach(el => {
    el.classList.remove('selected');
    el.querySelector('.zone-label')?.classList.remove('selected');
  });
  selectedId = id;
  const el = document.getElementById('zone-' + id);
  if (el) { el.classList.add('selected'); el.querySelector('.zone-label')?.classList.add('selected'); }
  const zone = zones.find(z => z.id === id);
  if (zone) showEditor(zone);
}

function showEditor(zone) {
  document.getElementById('zone-editor').classList.add('visible');
  document.getElementById('zone-name').value = zone.name;
  document.getElementById('zone-align').value = zone.align;
  document.getElementById('zone-rotate').value = zone.rotation;
  document.getElementById('rotate-val').textContent = zone.rotation + '°';
}
function hideEditor() { document.getElementById('zone-editor').classList.remove('visible'); }

document.getElementById('zone-name').addEventListener('input', e => {
  if (!selectedId) return;
  const zone = zones.find(z => z.id === selectedId);
  if (zone) { zone.name = e.target.value || 'zone_' + selectedId; reRenderZone(zone); }
});
document.getElementById('zone-align').addEventListener('change', e => {
  if (!selectedId) return;
  const zone = zones.find(z => z.id === selectedId);
  if (zone) zone.align = e.target.value;
});
document.getElementById('zone-rotate').addEventListener('input', e => {
  if (!selectedId) return;
  const zone = zones.find(z => z.id === selectedId);
  if (zone) {
    zone.rotation = parseInt(e.target.value);
    document.getElementById('rotate-val').textContent = zone.rotation + '°';
    reRenderZone(zone);
  }
});

function startDrag(e, id) {
  e.preventDefault(); dragging = id;
  const pos = getEventPos(e, container);
  const zone = zones.find(z => z.id === id);
  const { sx, sy } = getScale();
  dragStart = { mx: pos.x, my: pos.y, zx: zone.x / sx, zy: zone.y / sy };
  selectZone(id);
}

function startResize(e, id) {
  e.preventDefault(); resizing = id;
  const pos = getEventPos(e, container);
  const zone = zones.find(z => z.id === id);
  const { sx, sy } = getScale();
  resizeStart = { mx: pos.x, my: pos.y, zw: zone.w / sx, zh: zone.h / sy };
  selectZone(id);
}

function startRotate(e, id) {
  e.preventDefault(); rotating = id;
  const el = document.getElementById('zone-' + id);
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const cp = getClientPos(e);
  const zone = zones.find(z => z.id === id);
  rotateStart = {
    cx, cy,
    startAngle: Math.atan2(cp.y - cy, cp.x - cx) * 180 / Math.PI,
    initRotation: zone.rotation
  };
  selectZone(id);
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, { passive: false });
document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp);

function onMove(e) {
  if (!dragging && !resizing && !rotating) return;
  e.preventDefault();
  const { sx, sy } = getScale();

  if (dragging) {
    const pos = getEventPos(e, container);
    const zone = zones.find(z => z.id === dragging);
    zone.x = Math.max(0, Math.min(Math.round((dragStart.zx + pos.x - dragStart.mx) * sx), imgNatW - zone.w));
    zone.y = Math.max(0, Math.min(Math.round((dragStart.zy + pos.y - dragStart.my) * sy), imgNatH - zone.h));
    reRenderZone(zone);
  }

  if (resizing) {
    const pos = getEventPos(e, container);
    const zone = zones.find(z => z.id === resizing);
    zone.w = Math.max(30, Math.min(Math.round((resizeStart.zw + pos.x - resizeStart.mx) * sx), imgNatW - zone.x));
    zone.h = Math.max(20, Math.min(Math.round((resizeStart.zh + pos.y - resizeStart.my) * sy), imgNatH - zone.y));
    reRenderZone(zone);
  }

  if (rotating) {
    const cp = getClientPos(e);
    const angle = Math.atan2(cp.y - rotateStart.cy, cp.x - rotateStart.cx) * 180 / Math.PI;
    const zone = zones.find(z => z.id === rotating);
    let newRot = rotateStart.initRotation + (angle - rotateStart.startAngle);
    // Normalize to -180..180
    newRot = ((newRot + 180) % 360 + 360) % 360 - 180;
    zone.rotation = Math.round(newRot);
    reRenderZone(zone);
    if (selectedId === rotating) {
      document.getElementById('zone-rotate').value = zone.rotation;
      document.getElementById('rotate-val').textContent = zone.rotation + '°';
    }
  }
}

function onUp() { dragging = null; resizing = null; rotating = null; }

function clearAll() {
  zones = []; zoneCounter = 0; selectedId = null; hideEditor();
  document.querySelectorAll('.text-zone').forEach(el => el.remove());
  updateCount(); showToast('All zones cleared');
}

function updateCount() {
  document.getElementById('zone-count').textContent =
    zones.length + (zones.length === 1 ? ' zone' : ' zones');
}

function exportTemplate() {
  if (zones.length === 0) { showToast('Add at least one text zone!'); return; }
  const output = {
    template_name: 'template_' + Date.now(),
    image_width: imgNatW,
    image_height: imgNatH,
    text_zones: zones.map((z, i) => ({
      id: i + 1,
      name: z.name,
      x: z.x, y: z.y,
      w: z.w, h: z.h,
      rotation: z.rotation,
      align: z.align
    }))
  };
  const json = JSON.stringify(output);
  if (tg && tg.sendData) {
    tg.sendData(json);
    tg.close();
  } else {
    navigator.clipboard.writeText(JSON.stringify(output, null, 2))
      .then(() => showToast('JSON copied!'))
      .catch(() => prompt('Copy JSON:', JSON.stringify(output, null, 2)));
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

window.addEventListener('resize', () => { if (img.src) zones.forEach(z => reRenderZone(z)); });
</script>
</body>
</html>
