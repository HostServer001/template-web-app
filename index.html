<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meme Template Builder</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">Meme <span>Template</span> Builder</div>
    <div class="zone-count" id="zone-count">0 zones</div>
  </div>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🖼️</div>
        <p>Upload a meme image to start</p>
      </div>
      <img id="meme-img" src="" alt="" style="display:none;">
    </div>
  </div>

  <div class="bottom-panel">
    <div id="hint" class="hint" style="display:none;">
      Tap <strong>＋ Add Zone</strong> then tap image &nbsp;·&nbsp; <span style="color:#3b82f6">↻</span> blue dot rotates
    </div>
    <div id="upload-section">
      <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">📁 Upload Image</button>
      <button class="btn btn-secondary" id="add-zone-btn" style="display:none" onclick="toggleAddMode()">＋ Add Zone</button>
    </div>
    <div id="zone-editor">
      <div class="editor-row">
        <span class="editor-label">Name</span>
        <input class="editor-input" id="zone-name" placeholder="e.g. top_text" maxlength="30">
      </div>
      <!-- <div class="editor-row">
        <span class="editor-label">Align</span>
         <select class="editor-input" id="zone-align">
          <option value="center">Center</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div> -->
      <div class="editor-row">
        <span class="editor-label">Rotate</span>
        <input type="range" id="zone-rotate" min="-180" max="180" step="1" value="0">
        <span class="rotation-val" id="rotate-val">0°</span>
      </div>
    </div>
    <div id="actions" style="display:none;">
      <button class="btn btn-danger" onclick="clearAll()">🗑 Clear</button>
      <button class="btn btn-success" onclick="exportTemplate()">✓ Done &amp; Export</button>
    </div>
  </div>

  <div id="toast"></div>
  <input type="file" id="file-input" accept="image/*">
</div>

<script src="js/all.js"></script>
</body>
</html>
