<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meme Template Builder</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- PyScript (replaces all.js) -->
<link   rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
<script type="module"    src="https://pyscript.net/releases/2024.1.1/core.js"></script>

<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">Meme <span>Template</span> Builder</div>
    <div class="zone-count" id="zone-count">0 zones</div>
  </div>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🖼️</div>
        <p>Loading image…</p>
      </div>
      <img id="meme-img" src="" alt="" style="display:none;">
    </div>
  </div>

  <div class="bottom-panel">
    <div id="hint" class="hint" style="display:none;">
      Tap <strong>＋ Add Zone</strong> then tap image &nbsp;·&nbsp; or pick a <strong>preset</strong> below
    </div>

    <div id="top-actions" style="display:none;">
      <!-- onclick now calls window.toggleAddMode set by Python -->
      <button id="add-zone-btn" onclick="window.toggleAddMode()">＋ Add Zone</button>
    </div>

    <div id="presets-section">
      <div class="presets-label">Quick Presets</div>
      <div class="presets-scroll" id="presets-scroll"></div>
    </div>

    <div id="zone-editor">
      <div class="editor-row">
        <span class="editor-label">Name</span>
        <input class="editor-input" id="zone-name" placeholder="e.g. top_text" maxlength="30">
      </div>
      <div class="editor-row">
        <span class="editor-label">Rotate</span>
        <input type="range" id="zone-rotate" min="-180" max="180" step="1" value="0">
        <span class="rotation-val" id="rotate-val">0°</span>
      </div>
    </div>

    <div id="actions" style="display:none;">
      <button class="btn btn-danger"  onclick="window.clearAll()">🗑 Clear</button>
      <button class="btn btn-success" onclick="window.exportTemplate()">✓ Done &amp; Export</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<!-- Python replaces all.js — src points to your .py file -->
<script type="py" src="js/all.py"></script>

</body>
</html>
