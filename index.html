<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meme Template Builder</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">Meme <span>Template</span> Builder</div>
    <div class="zone-count" id="zone-count">0 zones</div>
  </div>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🖼️</div>
        <p>Loading image…</p>
      </div>
      <img id="meme-img" src="" alt="" style="display:none;">
    </div>
  </div>

  <div class="bottom-panel">
    <div id="hint" class="hint" style="display:none;">
      Tap <strong>＋ Add Zone</strong> then tap image &nbsp;·&nbsp; or pick a <strong>preset</strong> below
    </div>

    <!-- Add Zone button — full width, consistent padding -->
    <div id="top-actions" style="display:none;">
      <button id="add-zone-btn" onclick="toggleAddMode()">＋ Add Zone</button>
    </div>

    <!-- Predefined zone presets -->
    <div id="presets-section">
      <div class="presets-label">Quick Presets</div>
      <div class="presets-scroll" id="presets-scroll">
        <!-- chips injected by JS -->
      </div>
    </div>

    <!-- Zone editor -->
    <div id="zone-editor">
      <div class="editor-row">
        <span class="editor-label">Name</span>
        <input class="editor-input" id="zone-name" placeholder="e.g. top_text" maxlength="30">
      </div>
      <div class="editor-row">
        <span class="editor-label">Rotate</span>
        <input type="range" id="zone-rotate" min="-180" max="180" step="1" value="0">
        <span class="rotation-val" id="rotate-val">0°</span>
      </div>
    </div>

    <!-- Clear + Export -->
    <div id="actions" style="display:none;">
      <button class="btn btn-danger" onclick="clearAll()">🗑 Clear</button>
      <button class="btn btn-success" onclick="exportTemplate()">✓ Done &amp; Export</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script src="js/all.js"></script>
</body>
</html>
